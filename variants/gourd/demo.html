<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>gourd-progress demo</title>
<style>
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #221C4D, #161330);
    color: #EDEAFB; font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 14px 40px;
  }
  main { width: 100%; max-width: 560px; }
  h1 { font-size: 21px; font-weight: 600; margin: 4px 0 4px; }
  .eyebrow { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .25em; color: #FFB454; }
  p { font-size: 12.5px; color: #8F89BC; line-height: 1.7; margin: 0 0 14px; }
  .bar {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
    background: #1E1A3D; border: 1px solid #332D63;
    border-radius: 12px; padding: 10px 14px; flex-wrap: wrap;
  }
  button {
    font-family: inherit; font-size: 12px; cursor: pointer;
    border-radius: 8px; padding: 7px 12px;
    background: transparent; border: 1px solid #332D63; color: #8F89BC;
  }
  button.primary { background: #FFB454; border: none; color: #2A1B05; font-weight: 600; }
  input[type=range] { flex: 1; min-width: 80px; accent-color: #FFB454; }
  .readout { font-family: ui-monospace, monospace; font-size: 12px; min-width: 120px; }
  code { background: #1E1A3D; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
</style>
</head>
<body>
<main>
  <div class="eyebrow">PROGRESS LAB / GOURD</div>
  <h1>&lt;gourd-progress&gt; デモ</h1>
  <p>本番では <code>gp.value = 実進捗</code> を流し込むだけ。つるが伸びて生った
  <b>ひょうたんの実をクリック</b>すると、ぱかっと割れて中からめでたいものが出てきます。</p>

  <gourd-progress id="gp" demo="smooth" duration="16000"></gourd-progress>

  <div class="bar">
    <button id="play" class="primary">リセットして再生</button>
    <button id="src">進捗: なめらか</button>
    <button id="open">ぜんぶ割る</button>
    <input type="range" id="slider" min="0" max="100" step="0.1" value="0">
    <span class="readout" id="readout">実 0% / つる 0%</span>
  </div>
</main>

<script type="module">
  import "./gourd-progress.js";

  const gp = document.getElementById("gp");
  const play = document.getElementById("play");
  const src = document.getElementById("src");
  const openBtn = document.getElementById("open");
  const slider = document.getElementById("slider");
  const readout = document.getElementById("readout");

  play.addEventListener("click", () => {
    gp.reset();
    if (!gp.hasAttribute("demo")) gp.setAttribute("demo", "smooth");
  });

  src.addEventListener("click", () => {
    const next = gp.getAttribute("demo") === "step" ? "smooth" : "step";
    gp.setAttribute("demo", next);
    src.textContent = next === "step" ? "進捗: 10%刻み" : "進捗: なめらか";
  });

  openBtn.addEventListener("click", () => gp.openAll());

  // スライダー操作中は自走を止めて手動制御(本番の使い方と同じ)
  slider.addEventListener("input", () => {
    gp.removeAttribute("demo");
    gp.value = parseFloat(slider.value);
  });

  gp.addEventListener("complete", () => console.log("complete!"));
  gp.addEventListener("gourd-open", (e) => console.log("開封:", e.detail.treasure));

  setInterval(() => {
    readout.textContent =
      `実 ${Math.floor(gp.value)}% / つる ${Math.floor(gp.displayValue)}%`;
    if (document.activeElement !== slider) slider.value = gp.value;
  }, 120);
</script>
</body>
</html>
