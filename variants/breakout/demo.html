<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>breakout-progress demo</title>
<style>
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #221C4D, #161330);
    color: #EDEAFB; font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 14px 40px;
  }
  main { width: 100%; max-width: 560px; }
  h1 { font-size: 21px; font-weight: 600; margin: 4px 0 4px; }
  .eyebrow { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .25em; color: #FFB454; }
  .back { display: inline-block; font-family: ui-monospace, monospace; font-size: 11px; color: #8F89BC; text-decoration: none; margin-bottom: 14px; }
  .back:hover { color: #FFB454; }
  p { font-size: 12.5px; color: #8F89BC; line-height: 1.7; margin: 0 0 14px; }
  .bar {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
    background: #1E1A3D; border: 1px solid #332D63;
    border-radius: 12px; padding: 10px 14px; flex-wrap: wrap;
  }
  button {
    font-family: inherit; font-size: 12px; cursor: pointer;
    border-radius: 8px; padding: 7px 12px;
    background: transparent; border: 1px solid #332D63; color: #8F89BC;
  }
  button.primary { background: #FFB454; border: none; color: #2A1B05; font-weight: 600; }
  input[type=range] { flex: 1; min-width: 80px; accent-color: #FFB454; }
  .readout { font-family: ui-monospace, monospace; font-size: 12px; min-width: 120px; }
  code { background: #1E1A3D; padding: 1px 5px; border-radius: 4px; font-size: 11px; }
</style>
</head>
<body>
<main>
  <a class="back" href="../../index.html">← トップに戻る</a>
  <div class="eyebrow">PROGRESS LAB / BREAKOUT</div>
  <h1>&lt;breakout-progress&gt; デモ</h1>
  <p>実進捗が進むほどボールが画面中央から<strong>上に向かって</strong>次々と投入されます。
  <strong>パドルをマウス/タッチで動かして</strong>跳ね返し、ブロックを崩しましょう。
  ブロックには硬さ(HP)があり、当たるほどひびが入って割れます。外しても再投入され、
  放置しても完了フィナーレで必ず完走します。難易度はボール数とブロックの硬さで調整できます。</p>

  <breakout-progress id="bp" demo="smooth" duration="18000" max-balls="28" brick-hp="2"></breakout-progress>

  <div class="bar">
    <button id="play" class="primary">リセットして再生</button>
    <button id="src">進捗: なめらか</button>
    <input type="range" id="slider" min="0" max="100" step="0.1" value="0">
    <span class="readout" id="readout">実 0% / 崩し 0%</span>
  </div>
</main>

<script type="module">
  import "./breakout-progress.js";

  const bp = document.getElementById("bp");
  const play = document.getElementById("play");
  const src = document.getElementById("src");
  const slider = document.getElementById("slider");
  const readout = document.getElementById("readout");

  play.addEventListener("click", () => {
    bp.reset();
    if (!bp.hasAttribute("demo")) bp.setAttribute("demo", "smooth");
  });

  src.addEventListener("click", () => {
    const next = bp.getAttribute("demo") === "step" ? "smooth" : "step";
    bp.setAttribute("demo", next);
    src.textContent = next === "step" ? "進捗: 10%刻み" : "進捗: なめらか";
  });

  slider.addEventListener("input", () => {
    bp.removeAttribute("demo");
    bp.value = parseFloat(slider.value);
  });

  bp.addEventListener("complete", () => console.log("complete!"));

  setInterval(() => {
    readout.textContent =
      `実 ${Math.floor(bp.value)}% / 崩し ${Math.floor(bp.clearedValue)}%`;
    if (document.activeElement !== slider) slider.value = bp.value;
  }, 120);
</script>
</body>
</html>
